name: Electron weekly tariff check

on:
  schedule:
    # 07:00 UTC every Monday ≈ 09:00 Spain time (CEST, UTC+2).
    # Note: during winter (CET, UTC+1) this fires at 08:00 Spain time instead,
    # since GitHub Actions cron does not follow DST.
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

jobs:
  check-tariffs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - run: python electron.py
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
      - name: Commit results
        run: |
          git config user.name "electron-bot"
          git config user.email "actions@github.com"
          git add docs/results.json
          git diff --cached --quiet || git commit -m "chore: update tariff results [skip ci]"
          git push
